<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispatcharr - Portal Explorer & Integrator</title>
    <!-- Outfit Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: rgba(22, 26, 35, 0.65);
            --accent-color: #4f46e5;
            --accent-glow: rgba(79, 70, 229, 0.4);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.08);
            --success-color: #10b981;
            --success-glow: rgba(16, 185, 129, 0.3);
            --warning-color: #f59e0b;
            --error-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 10% 20%, rgba(79, 70, 229, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.1) 0%, transparent 40%);
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(11, 12, 16, 0.8);
            backdrop-filter: blur(12px);
            z-index: 100;
            position: sticky;
            top: 0;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            font-size: 2rem;
            animation: pulse 2s infinite alternate;
        }

        .logo-text h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a5b4fc, #818cf8, #4f46e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-text p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .back-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: var(--border-color);
            border-color: var(--text-secondary);
        }

        /* Container & Layout */
        .main-container {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 30px;
            padding: 30px 40px;
            flex-grow: 1;
            max-width: 1800px;
            width: 100%;
            margin: 0 auto;
        }

        @media (max-width: 1100px) {
            .main-container {
                grid-template-columns: 1fr;
            }
        }

        /* Card styles */
        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            backdrop-filter: blur(16px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            display: flex;
            flex-direction: column;
            height: calc(100vh - 160px);
            min-height: 500px;
        }

        .card-header {
            padding: 20px 25px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header h2 {
            font-size: 1.15rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-body {
            padding: 20px 25px;
            overflow-y: auto;
            flex-grow: 1;
        }

        /* Search & Toolbar */
        .toolbar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-wrapper {
            position: relative;
            flex-grow: 1;
            min-width: 250px;
        }

        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            padding: 10px 15px 10px 40px;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .tool-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .tool-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--text-secondary);
        }

        /* Hierarchical Tree Structure */
        .tree-container {
            list-style: none;
            padding-left: 0;
        }

        .tree-node {
            margin: 4px 0;
        }

        .node-row {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            gap: 8px;
            user-select: none;
        }

        .node-row:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        /* Indentations for nesting levels */
        .level-0 { font-weight: 600; font-size: 1.05rem; }
        .level-1 { margin-left: 20px; font-weight: 500; font-size: 0.95rem; color: #cbd5e1; }
        .level-2 { margin-left: 45px; font-size: 0.9rem; color: #94a3b8; }

        .toggle-icon {
            width: 16px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
            transition: transform 0.2s;
        }

        .collapsed .toggle-icon {
            transform: rotate(-90deg);
        }

        .node-icon {
            font-size: 1.1rem;
            display: inline-block;
            width: 20px;
            text-align: center;
        }

        /* Checkbox styling */
        .node-checkbox {
            width: 16px;
            height: 16px;
            accent-color: var(--accent-color);
            cursor: pointer;
        }

        .node-label {
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .node-count {
            font-size: 0.75rem;
            background: rgba(255, 255, 255, 0.08);
            padding: 2px 6px;
            border-radius: 10px;
            color: var(--text-secondary);
        }

        .node-children {
            list-style: none;
            padding-left: 0;
            transition: max-height 0.3s ease-out;
        }

        .collapsed + .node-children {
            display: none;
        }

        /* Import Sidebar Form */
        .import-sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .summary-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .summary-number {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--accent-color);
            text-shadow: 0 0 15px var(--accent-glow);
            animation: pulse-glow 2.5s infinite alternate;
        }

        .summary-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .select-input, .text-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            padding: 10px 12px;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
        }

        .select-input:focus, .text-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .select-input option {
            background-color: var(--bg-color);
            color: var(--text-primary);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            cursor: pointer;
            user-select: none;
        }

        .checkbox-group label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: pointer;
        }

        /* Action Buttons */
        .import-btn {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border: none;
            color: white;
            padding: 14px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s;
            box-shadow: 0 4px 15px var(--accent-glow);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }

        .import-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.6);
        }

        .import-btn:active {
            transform: translateY(0);
        }

        .import-btn:disabled {
            background: #2e303d;
            box-shadow: none;
            color: var(--text-secondary);
            cursor: not-allowed;
            transform: none;
        }

        /* Loading / Progress overlay */
        .progress-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(11, 12, 16, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .progress-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        .progress-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            text-align: center;
        }

        .progress-bar-container {
            width: 100%;
            max-width: 400px;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--accent-color), var(--success-color));
            border-radius: 5px;
            transition: width 0.2s ease;
        }

        .progress-count {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* Toast notifications */
        .toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: rgba(22, 26, 35, 0.95);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 15px 25px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 15px;
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .toast.active {
            transform: translateX(0);
        }

        .toast-success {
            border-left: 4px solid var(--success-color);
        }

        .toast-error {
            border-left: 4px solid var(--error-color);
        }

        /* Animations */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.85; }
            100% { transform: scale(1.08); opacity: 1; }
        }

        @keyframes pulse-glow {
            0% { text-shadow: 0 0 10px var(--accent-glow); }
            100% { text-shadow: 0 0 25px rgba(79, 70, 229, 0.7); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-section">
            <span class="logo-icon">🎯</span>
            <div class="logo-text">
                <h1>Portal Explorer & Integrator</h1>
                <p>IPTV-Hierarchiemanager & Bulk-Playlist-Importer</p>
            </div>
        </div>
        <a href="/admin/plugins/pluginconfig/" class="back-btn">
            <span>🔌</span> Zurück zu Plugins
        </a>
    </header>

    <div class="main-container">
        
        <!-- Left Panel: Tree View Card -->
        <div class="glass-card">
            <div class="card-header">
                <h2><span>📂</span> Importierte Portale &amp; Kanäle</h2>
                <div>
                    <span id="selected-summary-header" style="font-size: 0.85rem; color: var(--text-secondary)">0 Kanäle ausgewählt</span>
                </div>
            </div>
            
            <div class="card-body">
                <!-- Toolbar with search and bulk tools -->
                <div class="toolbar">
                    <div class="search-wrapper">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="search-bar" class="search-input" placeholder="Nach Kanal- oder Streamnamen suchen...">
                    </div>
                    <button class="tool-btn" id="btn-select-all">✔️ Alle auswählen</button>
                    <button class="tool-btn" id="btn-deselect-all">✖ Auswahl aufheben</button>
                    <button class="tool-btn" id="btn-collapse-all">📂 Alle einklappen</button>
                    <button class="tool-btn" id="btn-expand-all">📖 Alle ausklappen</button>
                </div>

                <!-- Tree structure placeholder -->
                <ul class="tree-container" id="portal-tree">
                    <div style="text-align:center; padding: 50px; color: var(--text-secondary)">
                        <div class="spinner" style="margin: 0 auto 20px;"></div>
                        Baumstruktur wird geladen, bitte warten...
                    </div>
                </ul>
            </div>
        </div>

        <!-- Right Panel: Import Console Card -->
        <div class="glass-card" style="height: auto; max-height: calc(100vh - 160px)">
            <div class="card-header">
                <h2><span>🎯</span> Import-Konsole</h2>
            </div>
            
            <div class="card-body" style="overflow-y: auto;">
                <div class="import-sidebar">
                    
                    <div class="summary-box">
                        <div class="summary-number" id="selected-count-badge">0</div>
                        <div class="summary-label">Kanäle für Import ausgewählt</div>
                    </div>

                    <!-- Target Group Selection -->
                    <div class="form-group">
                        <label for="group-selector">Ziel-Kanalgruppe wählen</label>
                        <select id="group-selector" class="select-input">
                            <option value="">-- Neue Gruppe erstellen --</option>
                        </select>
                    </div>

                    <!-- New Group Creation -->
                    <div class="form-group" id="new-group-wrapper">
                        <label for="new-group-name">Neue Kanalgruppe benennen</label>
                        <input type="text" id="new-group-name" class="text-input" placeholder="z. B. Meine Premium Sportkanäle">
                    </div>

                    <!-- Category Preservation Option -->
                    <div class="checkbox-group">
                        <input type="checkbox" id="keep-provider-categories" class="node-checkbox" checked>
                        <label for="keep-provider-categories">Bestehende Kategorien als Gruppen beibehalten</label>
                    </div>

                    <!-- Auto Numbering Option -->
                    <div class="checkbox-group">
                        <input type="checkbox" id="auto-number-channels" class="node-checkbox" checked>
                        <label for="auto-number-channels">Freie Kanalnummern fortlaufend vergeben</label>
                    </div>

                    <button class="import-btn" id="btn-start-import" disabled>
                        <span>🚀</span> Ausgewählte Kanäle importieren
                    </button>

                </div>
            </div>

            <!-- Progress / Loading overlay within the card -->
            <div class="progress-overlay" id="progress-panel">
                <div class="spinner"></div>
                <div class="progress-text" id="progress-status-text">Kanäle werden importiert...</div>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="progress-bar-fill"></div>
                </div>
                <div class="progress-count" id="progress-count-text">0 / 0 Kanäle</div>
            </div>
        </div>

    </div>

    <!-- Notification Container -->
    <div class="toast-container" id="toast-container"></div>

    <script>
        // State variables
        let rawTreeData = [];
        let selectedStreams = new Set();
        let existingGroups = [];

        // DOM elements
        const portalTree = document.getElementById('portal-tree');
        const selectedCountBadge = document.getElementById('selected-count-badge');
        const selectedSummaryHeader = document.getElementById('selected-summary-header');
        const groupSelector = document.getElementById('group-selector');
        const newGroupWrapper = document.getElementById('new-group-wrapper');
        const newGroupName = document.getElementById('new-group-name');
        const btnStartImport = document.getElementById('btn-start-import');
        const keepProviderCategories = document.getElementById('keep-provider-categories');
        const searchBar = document.getElementById('search-bar');
        const progressPanel = document.getElementById('progress-panel');
        const progressBarFill = document.getElementById('progress-bar-fill');
        const progressStatusText = document.getElementById('progress-status-text');
        const progressCountText = document.getElementById('progress-count-text');

        // Initialize view
        document.addEventListener('DOMContentLoaded', () => {
            loadTreeData();
            loadGroupsData();
            setupEventListeners();
        });

        // Event listeners
        function setupEventListeners() {
            groupSelector.addEventListener('change', () => {
                if (groupSelector.value === "") {
                    newGroupWrapper.style.display = "flex";
                } else {
                    newGroupWrapper.style.display = "none";
                }
            });

            document.getElementById('btn-select-all').addEventListener('click', selectAll);
            document.getElementById('btn-deselect-all').addEventListener('click', deselectAll);
            document.getElementById('btn-collapse-all').addEventListener('click', () => toggleAllFolders(false));
            document.getElementById('btn-expand-all').addEventListener('click', () => toggleAllFolders(true));
            
            searchBar.addEventListener('input', filterTree);
            btnStartImport.addEventListener('click', startImportProcess);
        }

        // API: Load Tree
        function loadTreeData() {
            fetch('/portal-explorer/api/tree/')
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'ok') {
                        rawTreeData = data.tree;
                        renderTree(rawTreeData);
                    } else {
                        showToast('Fehler beim Laden der Baumstruktur: ' + data.message, 'error');
                        portalTree.innerHTML = `<div style="text-align:center; padding:50px; color:var(--error-color)">Fehler: ${data.message}</div>`;
                    }
                })
                .catch(err => {
                    showToast('Netzwerkfehler beim Laden der Baumstruktur.', 'error');
                    portalTree.innerHTML = '<div style="text-align:center; padding:50px; color:var(--error-color)">Netzwerkfehler.</div>';
                });
        }

        // API: Load Existing Groups
        function loadGroupsData() {
            fetch('/portal-explorer/api/groups/')
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'ok') {
                        existingGroups = data.groups;
                        populateGroups(existingGroups);
                    }
                });
        }

        function populateGroups(groups) {
            groupSelector.innerHTML = '<option value="">-- Neue Gruppe erstellen --</option>';
            groups.forEach(g => {
                const opt = document.createElement('option');
                opt.value = g.id;
                opt.textContent = g.name;
                groupSelector.appendChild(opt);
            });
        }

        // Rendering: Build Node Elements
        function renderTree(tree) {
            portalTree.innerHTML = '';
            if (tree.length === 0) {
                portalTree.innerHTML = '<div style="text-align:center; padding: 40px; color:var(--text-secondary)">Keine importierten Portale oder Streams in der Datenbank vorhanden.</div>';
                return;
            }

            tree.forEach(portal => {
                const portalNode = createTreeNode({
                    id: `p-${portal.key}`,
                    label: portal.name,
                    icon: '📡',
                    level: 0,
                    count: portal.categories.reduce((acc, cat) => acc + cat.streams.length, 0),
                    children: portal.categories.map(cat => ({
                        id: `p-${portal.key}-c-${cat.id}`,
                        label: cat.name,
                        icon: '📁',
                        level: 1,
                        count: cat.streams.length,
                        children: cat.streams.map(str => ({
                            id: `str-${str.id}`,
                            label: str.name,
                            icon: '📺',
                            level: 2,
                            stream_id: str.id,
                            tvg: str.tvg_id
                        }))
                    }))
                });
                portalTree.appendChild(portalNode);
            });
            updateImportButtonState();
        }

        function createTreeNode(nodeData) {
            const li = document.createElement('li');
            li.className = 'tree-node';
            li.id = nodeData.id;

            const row = document.createElement('div');
            row.className = `node-row level-${nodeData.level}`;
            
            // Toggle icon for collapsible groups (level 0 & 1)
            const toggleSpan = document.createElement('span');
            toggleSpan.className = 'toggle-icon';
            if (nodeData.children && nodeData.children.length > 0) {
                toggleSpan.textContent = '▼';
                row.addEventListener('click', (e) => {
                    if (e.target.tagName !== 'INPUT') {
                        li.classList.toggle('collapsed');
                    }
                });
            } else {
                toggleSpan.textContent = '•';
            }
            row.appendChild(toggleSpan);

            // Checkbox
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'node-checkbox';
            checkbox.dataset.nodeId = nodeData.id;
            if (nodeData.stream_id) {
                checkbox.dataset.streamId = nodeData.stream_id;
            }
            
            checkbox.addEventListener('change', () => {
                handleCheckboxChange(nodeData, checkbox.checked);
            });
            row.appendChild(checkbox);

            // Node Icon
            const iconSpan = document.createElement('span');
            iconSpan.className = 'node-icon';
            iconSpan.textContent = nodeData.icon;
            row.appendChild(iconSpan);

            // Label text
            const labelSpan = document.createElement('span');
            labelSpan.className = 'node-label';
            labelSpan.textContent = nodeData.label;
            row.appendChild(labelSpan);

            // Tvg/Details tooltip for channels (level 2)
            if (nodeData.level === 2 && nodeData.tvg) {
                const details = document.createElement('span');
                details.style.fontSize = '0.75rem';
                details.style.color = 'var(--text-secondary)';
                details.textContent = `(${nodeData.tvg})`;
                row.appendChild(details);
            }

            // Count badge for groups
            if (nodeData.count !== undefined) {
                const countBadge = document.createElement('span');
                countBadge.className = 'node-count';
                countBadge.textContent = nodeData.count;
                row.appendChild(countBadge);
            }

            li.appendChild(row);

            // Child nodes container
            if (nodeData.children && nodeData.children.length > 0) {
                const ul = document.createElement('ul');
                ul.className = 'node-children';
                nodeData.children.forEach(child => {
                    ul.appendChild(createTreeNode(child));
                });
                li.appendChild(ul);
            }

            return li;
        }

        // Cascading Selection Logic
        function handleCheckboxChange(nodeData, checked) {
            // Select/deselect this item in state
            if (nodeData.stream_id) {
                if (checked) {
                    selectedStreams.add(nodeData.stream_id);
                } else {
                    selectedStreams.delete(nodeData.stream_id);
                }
            }

            // Cascading down to all children
            if (nodeData.children && nodeData.children.length > 0) {
                nodeData.children.forEach(child => {
                    const cb = document.querySelector(`.node-checkbox[data-node-id="${child.id}"]`);
                    if (cb && cb.checked !== checked) {
                        cb.checked = checked;
                        handleCheckboxChange(child, checked);
                    }
                });
            }

            // Cascading up to update parent status (indeterminate / checked)
            updateParentCheckboxes(nodeData.id);
            updateSelectionCounts();
        }

        function updateParentCheckboxes(nodeId) {
            // Get parent ID (e.g. p-1-c-5 -> parent is p-1)
            const parts = nodeId.split('-');
            if (parts.length <= 1) return;

            let parentId = '';
            if (parts[0] === 'str') return; // Stream node -> parent is category
            
            // Reconstruct parent ID
            if (nodeId.includes('-c-')) {
                parentId = nodeId.split('-c-')[0];
            } else {
                return;
            }

            const parentNode = document.getElementById(parentId);
            if (!parentNode) return;

            const parentCb = parentNode.querySelector(`.node-row > .node-checkbox`);
            const childrenCbs = parentNode.querySelectorAll(`.node-children > .tree-node > .node-row > .node-checkbox`);
            
            if (parentCb && childrenCbs.length > 0) {
                const allChecked = Array.from(childrenCbs).every(cb => cb.checked);
                const someChecked = Array.from(childrenCbs).some(cb => cb.checked || cb.indeterminate);
                
                parentCb.checked = allChecked;
                parentCb.indeterminate = !allChecked && someChecked;
            }

            // Recursively update grandfather
            updateParentCheckboxes(parentId);
        }

        // Selection Management
        function updateSelectionCounts() {
            const count = selectedStreams.size;
            selectedCountBadge.textContent = count;
            selectedSummaryHeader.textContent = `${count} Kanäle ausgewählt`;
            updateImportButtonState();
        }

        function updateImportButtonState() {
            btnStartImport.disabled = (selectedStreams.size === 0);
        }

        function selectAll() {
            const cbs = document.querySelectorAll('.node-checkbox');
            cbs.forEach(cb => {
                cb.checked = true;
                cb.indeterminate = false;
                const streamId = parseInt(cb.dataset.streamId);
                if (streamId) {
                    selectedStreams.add(streamId);
                }
            });
            updateSelectionCounts();
        }

        function deselectAll() {
            const cbs = document.querySelectorAll('.node-checkbox');
            cbs.forEach(cb => {
                cb.checked = false;
                cb.indeterminate = false;
            });
            selectedStreams.clear();
            updateSelectionCounts();
        }

        function toggleAllFolders(expand) {
            const nodes = document.querySelectorAll('.tree-node');
            nodes.forEach(node => {
                if (node.querySelector('.node-children')) {
                    if (expand) {
                        node.classList.remove('collapsed');
                    } else {
                        node.classList.add('collapsed');
                    }
                }
            });
        }

        // Search Filter
        function filterTree() {
            const query = searchBar.value.toLowerCase().strip();
            const nodes = document.querySelectorAll('.tree-node');

            if (!query) {
                nodes.forEach(n => {
                    n.style.display = 'block';
                    n.classList.add('collapsed');
                });
                // Keep top folders expanded
                document.querySelectorAll('.level-0').forEach(el => {
                    el.parentElement.classList.remove('collapsed');
                });
                return;
            }

            // Hide/show nodes matching query
            nodes.forEach(node => {
                if (node.id.startsWith('str-')) {
                    const label = node.querySelector('.node-label').textContent.toLowerCase();
                    const match = label.includes(query);
                    node.style.display = match ? 'block' : 'none';
                } else {
                    node.style.display = 'block'; // Always show group folders if they contain matches
                }
            });

            // Auto-expand any group folder that contains visible items, hide group folders that have 0 visible items
            const portalNodes = document.querySelectorAll('.tree-node[id^="p-"]');
            portalNodes.forEach(folder => {
                const visibleStreams = folder.querySelectorAll('.tree-node[id^="str-"][style="display: block;"]');
                if (visibleStreams.length > 0) {
                    folder.style.display = 'block';
                    folder.classList.remove('collapsed');
                } else {
                    folder.style.display = 'none';
                }
            });
        }

        // Action API: Bulk Import
        function startImportProcess() {
            if (selectedStreams.size === 0) return;

            const selectedGroup = groupSelector.value;
            const newGroup = newGroupName.value.strip();

            if (selectedGroup === "" && newGroup === "") {
                showToast("Bitte geben Sie einen Namen für die neue Kanalgruppe an.", "error");
                newGroupName.focus();
                return;
            }

            // Show progress panel
            progressPanel.classList.add('active');
            progressBarFill.style.width = '0%';
            progressStatusText.textContent = "Importvorgang wird vorbereitet...";
            progressCountText.textContent = `0 / ${selectedStreams.size} Kanäle`;

            const streamIds = Array.from(selectedStreams);

            const payload = {
                stream_ids: streamIds,
                target_group_id: selectedGroup || null,
                new_group_name: selectedGroup ? null : newGroup,
                keep_categories: keepProviderCategories.checked,
                auto_number: document.getElementById('auto-number-channels').checked
            };

            fetch('/portal-explorer/api/import/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'ok') {
                    // Simulate progressive loading bar for smooth UX
                    simulateProgressBar(streamIds.length, () => {
                        progressPanel.classList.remove('active');
                        showToast(`Erfolgreich ${data.imported_count} Kanäle importiert!`, 'success');
                        deselectAll();
                        loadGroupsData(); // Refresh group dropdown
                    });
                } else {
                    progressPanel.classList.remove('active');
                    showToast('Import fehlgeschlagen: ' + data.message, 'error');
                }
            })
            .catch(err => {
                progressPanel.classList.remove('active');
                showToast('Verbindungsfehler beim Importieren der Kanäle.', 'error');
            });
        }

        function simulateProgressBar(total, callback) {
            let current = 0;
            const step = Math.ceil(total / 20); // 20 steps
            const interval = setInterval(() => {
                current += step;
                if (current >= total) {
                    current = total;
                    clearInterval(interval);
                    progressBarFill.style.width = '100%';
                    progressCountText.textContent = `${total} / ${total} Kanäle`;
                    setTimeout(callback, 500);
                } else {
                    const pct = (current / total) * 100;
                    progressBarFill.style.width = `${pct}%`;
                    progressCountText.textContent = `${current} / ${total} Kanäle`;
                    progressStatusText.textContent = "Kanalrelationen werden verknüpft...";
                }
            }, 60);
        }

        // Helper: Toast alerts
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            
            const icon = type === 'success' ? '✅' : '❌';
            toast.innerHTML = `<span>${icon}</span> <div>${message}</div>`;
            
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('active'), 50);
            
            // Remove after 5 seconds
            setTimeout(() => {
                toast.classList.remove('active');
                setTimeout(() => toast.remove(), 400);
            }, 5000);
        }

        // Helper: CSRF Cookie
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].strip();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>
</body>
</html>
