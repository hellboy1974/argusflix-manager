# docker-compose.yml for Synology NAS (Container Manager)
# Customize the absolute paths (/volume1/docker/...) to match your actual Synology folder structure.

services:
  dispatcharr:
    # Option 1 (Recommended): Use the official pre-built image and mount your custom plugins/scripts.
    image: ghcr.io/dispatcharr/dispatcharr:latest
    
    # Option 2 (Uncomment if you made changes to the core code of Dispatcharr-0.25.1):
    # build:
    #   context: /volume1/docker/dispatcharr/Dispatcharr-0.25.1
    #   dockerfile: docker/Dockerfile
    
    container_name: dispatcharr
    restart: unless-stopped
    ports:
      - 9191:9191
    volumes:
      # Data persistence (database, logs, uploads, backups)
      - /volume1/docker/dispatcharr/data:/data
      
      # Custom plugins directory
      - /volume1/docker/dispatcharr/plugins:/data/plugins
      
      # Custom scripts directory
      - /volume1/docker/dispatcharr/scripts:/data/scripts
      
    environment:
      - DISPATCHARR_ENV=aio
      - REDIS_HOST=localhost
      - CELERY_BROKER_URL=redis://localhost:6379/0
      - DISPATCHARR_LOG_LEVEL=info
      - DISPATCHARR_ALLOWED_SCRIPT_DIRS=/data/scripts
      
      # Optional: Synology specific environment variables (e.g., timezone, PUID/PGID if supported)
      - TZ=Europe/Berlin
      
    # Optional: Hardware acceleration (Intel QuickSync / VA-API)
    # Synology models with Intel CPUs support hardware transcoding.
    #devices:
    #  - /dev/dri:/dev/dri
